<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Proton Theme – Einstellungen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", "Segoe UI", sans-serif;
      background: #16141c;
      color: #ffffff;
      padding: 24px;
      min-width: 340px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 13px;
      color: #979bb0;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      color: #979bb0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .presets {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .preset-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .preset-btn:hover { background: #25283a; }

    .preset-btn.active .swatch {
      box-shadow: 0 0 0 3px #ffffff;
    }

    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
    }

    .preset-btn span {
      font-size: 11px;
      color: #979bb0;
    }

    .custom-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .custom-row label {
      font-size: 14px;
    }

    input[type="color"] {
      width: 48px;
      height: 36px;
      border: 1px solid #34384e;
      border-radius: 8px;
      background: #1e2130;
      cursor: pointer;
      padding: 2px;
    }

    #custom-hex {
      background: #1e2130;
      border: 1px solid #34384e;
      border-radius: 8px;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 14px;
      width: 110px;
      font-family: monospace;
    }

    .save-btn {
      background: var(--accent, #e53265);
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .save-btn:hover { opacity: 0.85; }

    .status {
      font-size: 13px;
      color: #2fd6b5;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1>🎨 Proton Theme</h1>
  <p class="subtitle">Akzentfarbe anpassen</p>

  <h2>Voreinstellungen</h2>
  <div class="presets">
    <button class="preset-btn" data-color="#e53265">
      <div class="swatch" style="background:#e53265"></div>
      <span>Pink</span>
    </button>
    <button class="preset-btn" data-color="#8838ff">
      <div class="swatch" style="background:#8838ff"></div>
      <span>Purple</span>
    </button>
    <button class="preset-btn" data-color="#4361ee">
      <div class="swatch" style="background:#4361ee"></div>
      <span>Blue</span>
    </button>
    <button class="preset-btn" data-color="#2fd6b5">
      <div class="swatch" style="background:#2fd6b5"></div>
      <span>Teal</span>
    </button>
    <button class="preset-btn" data-color="#ff6d3b">
      <div class="swatch" style="background:#ff6d3b"></div>
      <span>Orange</span>
    </button>
  </div>

  <h2>Eigene Farbe</h2>
  <div class="custom-row">
    <label>Farbe:</label>
    <input type="color" id="color-picker" value="#e53265">
    <input type="text"  id="custom-hex"   value="#e53265" maxlength="7" placeholder="#e53265">
  </div>

  <button class="save-btn" id="save-btn">Speichern</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
